<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字朗讀助理 Pro (終極語氣版)</title>
    <style>
        /* CSS 變數：預設淺色模式 */
        :root {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --highlight-bg: #FFFFCC; 
            --hover-bg: #f0f0f0;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --btn-disabled: #cccccc;
            --status-color: #666666;
        }

        /* 系統深色模式偵測 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --container-bg: #2c2c2e;
                --text-color: #e5e5ea;
                --border-color: #48484a;
                --highlight-bg: rgba(255, 255, 102, 0.25); 
                --hover-bg: #3a3a3c;
                --btn-bg: #e5e5ea;
                --btn-text: #000000;
                --btn-hover: #ffffff;
                --btn-disabled: #48484a;
                --status-color: #aeaeb2;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            transition: background-color 0.3s;
        }
        .text-area-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: none;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            line-height: 1.8;
            outline: none;
            background-color: transparent;
            color: var(--text-color);
        }
        #readDisplay {
            display: none;
            padding: 15px;
            font-size: 16px;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .sentence {
            transition: background-color 0.2s;
            border-radius: 4px;
            cursor: pointer;
        }
        .sentence:hover {
            background-color: var(--hover-bg);
        }
        .active-sentence {
            background-color: var(--highlight-bg); 
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        select, button {
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            background-color: var(--container-bg);
            color: var(--text-color);
        }
        select {
            flex: 2;
        }
        button {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            transition: background 0.2s;
            flex: 1;
        }
        button:hover { background-color: var(--btn-hover); }
        button:disabled { 
            background-color: var(--btn-disabled); 
            color: #888;
            cursor: not-allowed; 
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        input[type="range"] { flex: 1; }
        .status {
            font-size: 13px;
            color: var(--status-color);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0; margin-bottom: 15px;">文字朗讀助理 Pro</h2>
    
    <div class="controls">
        <select id="voiceSelect">
            <option value="">載入語音模組中...</option>
        </select>
    </div>

    <div class="text-area-container" id="textContainer">
        <textarea id="textInput" placeholder="請在此貼上你想朗讀的文字（不限長短，中英泰皆可）..."></textarea>
        <div id="readDisplay"></div>
    </div>
    
    <div class="controls">
        <button id="btnPlay">播放 / 導讀</button>
        <button id="btnPause" disabled>暫停</button>
        <button id="btnResume" disabled>繼續</button>
        <button id="btnRewind" disabled>回溯 (上一句)</button>
        <button id="btnEdit">返回編輯</button>
    </div>

    <div class="slider-container">
        <label for="speedRange">基準語速 (預設1.3)：</label>
        <input type="range" id="speedRange" min="0.5" max="3.0" step="0.1" value="1.3">
        <span id="speedValue">1.3x</span>
    </div>

    <div class="status" id="statusText">系統待命中...</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let sentencesRaw = [];
    let currentSentenceIndex = 0;
    let isSpeedAdjusting = false; 

    // 泰文原生字與固定單字字典
    const thaiDictionary = {
        "ครับ": "khrap", "ค่ะ": "kha", "คะ": "kha", "นะ": "na", 
        "จ้ะ": "cha", "จ้า": "cha", "สิ": "si", "เถอะ": "thoe", 
        "คุณ": "khun", "พี่": "Pi", "น้อง": "nong", "อาจารย์": "ajarn", 
        "ครู": "khru", "หมอ": "mor", "เชฟ": "chef", 
        "หลวงพี่": "luang Pi", "หลวงพ่อ": "luang pho", 
        "ป้า": "pa", "ลุง": "lung", "ตา": "ta", "ยาย": "yai",
        "โห": "oh-hoh", "อ้าว": "ao", "เฮ้ย": "hey", "ว้าว": "wao", "อุ๊ย": "ui",
        "ไอ้เหี้ย": "ai hia", "สัส": "sat", "แม่ง": "maeng", "โคตร": "khot", 
        "ชิบหาย": "chip hai", "กู": "ku", "มึง": "mueng",
        "รัก": "rak", "คิดถึง": "khit thueng", "ชอบ": "chop", "อร่อย": "aroi", 
        "ใช่": "chai", "ไม่": "mai", "โอเค": "o-ke", "ขอโทษ": "kho thot", "ขอบคุณ": "khop khun",
        "ทำไม": "tham mai", "อะไร": "a-rai",
        "jing": "jing", "ngong": "ngong", "mak": "mak", "su su": "su su"
    };

    function loadVoices() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        
        const allowedPrefixes = ['zh', 'en', 'th', 'ja', 'ko', 'yue']; 
        const filteredVoices = voices.filter(v => allowedPrefixes.some(prefix => v.lang.toLowerCase().startsWith(prefix)));

        let zhVoices = filteredVoices.filter(v => v.lang.toLowerCase().startsWith('zh') || v.lang.toLowerCase().startsWith('yue'));
        let otherVoices = filteredVoices.filter(v => !(v.lang.toLowerCase().startsWith('zh') || v.lang.toLowerCase().startsWith('yue')));

        let top5Zh = [];
        const extractVoice = (keywords) => {
            const idx = zhVoices.findIndex(v => keywords.some(kw => v.name.toLowerCase().includes(kw.toLowerCase())));
            if (idx !== -1) return zhVoices.splice(idx, 1)[0];
            return null;
        };

        const v1 = extractVoice(['siri', 'mei-jia', 'xiaoxiao']); 
        const v2 = extractVoice(['yating', 'ting-ting', 'female', '女']);
        const v3 = extractVoice(['yunxi', 'yunjian', 'male', '男']);
        const v4 = extractVoice(['tw', 'taiwan']);
        const v5 = extractVoice(['hk', 'hongkong', 'yue']);

        if (v1) top5Zh.push({label: '語音樣式 1 (高階女聲)', voice: v1});
        if (v2) top5Zh.push({label: '語音樣式 2 (標準女聲)', voice: v2});
        if (v3) top5Zh.push({label: '語音樣式 3 (沉穩男聲)', voice: v3});
        if (v4) top5Zh.push({label: '語音樣式 4 (清亮女聲)', voice: v4});
        if (v5) top5Zh.push({label: '語音樣式 5 (粵/港腔調)', voice: v5});

        while(top5Zh.length < 5 && zhVoices.length > 0) {
            top5Zh.push({label: `語音樣式 ${top5Zh.length + 1} (系統備用)`, voice: zhVoices.shift()});
        }

        if (top5Zh.length > 0) {
            const zhGroup = document.createElement('optgroup');
            zhGroup.label = "🤖 精選中文擬真語音 (5款)";
            top5Zh.forEach(item => {
                const option = document.createElement('option');
                option.textContent = `${item.label} - ${item.voice.name}`;
                option.value = item.voice.name;
                zhGroup.appendChild(option);
            });
            voiceSelect.appendChild(zhGroup);
        }

        const combinedRemaining = [...zhVoices, ...otherVoices];
        if (combinedRemaining.length > 0) {
            const otherGroup = document.createElement('optgroup');
            otherGroup.label = "🌍 其他支援語言 (英/泰/日/韓)";
            combinedRemaining.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                otherGroup.appendChild(option);
            });
            voiceSelect.appendChild(otherGroup);
        }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }
    setTimeout(loadVoices, 500);

    speedRange.addEventListener('input', () => {
        speedValue.textContent = speedRange.value + 'x';
    });

    speedRange.addEventListener('change', () => {
        if (synth.speaking && !synth.paused) {
            isSpeedAdjusting = true; 
            synth.cancel();
            setTimeout(() => {
                speakSentence(currentSentenceIndex);
                isSpeedAdjusting = false;
            }, 50); 
        }
    });

    // 🏆 核心強化：泰式稱謂與情緒詞正則表達式攔截器
    function preprocessText(text) {
        let processedText = text;

        // 1. 稱謂與前綴自動解壓縮
        processedText = processedText.replace(/\bP'/gi, "Phi ");
        processedText = processedText.replace(/\bN'/gi, "Nong ");
        processedText = processedText.replace(/\bK'/gi, "Khun ");
        processedText = processedText.replace(/\bAi'/gi, "Ai ");
        processedText = processedText.replace(/\b[EI]'/gi, "Ee "); 

        // 2. ★ 情緒詞與語氣詞「中文擬音」強制校正 (讓Siri念出靈魂) ★
        processedText = processedText.replace(/\bAo[w]*\b/gi, "嗷");    // Ao, Aow -> 嗷
        processedText = processedText.replace(/O~ho+/gi, "喔齁");       // 處理帶波浪號的 O~ho -> 喔齁
        processedText = processedText.replace(/\bOho+\b/gi, "喔齁");    // 一般的 Oho -> 喔齁
        processedText = processedText.replace(/\bO[iy]+\b/gi, "噢伊");  // Oi, Oii -> 噢伊
        processedText = processedText.replace(/\bNa+\b/gi, "吶");       // Na, Naa -> 吶 (語氣輕聲)
        processedText = processedText.replace(/\b[Jj]a+\b/gi, "佳");    // Ja, Jaa -> 佳
        processedText = processedText.replace(/\b[Kk]h?a+\b/gi, "卡");  // Kha -> 卡
        processedText = processedText.replace(/\bW[oe]i+\b/gi, "喂");   // Woi -> 喂
        processedText = processedText.replace(/\b[Ee]uy+\b/gi, "欸");   // Euy -> 欸
        
        // 3. 常見泰百羅馬拼音髒話/俗語校正 (一樣用中文擬音輔助)
        processedText = processedText.replace(/\bShia+\b/gi, "嚇");     // Shia -> 嚇 (發音近 hia，急促)
        processedText = processedText.replace(/\bHia+\b/gi, "嚇"); 
        processedText = processedText.replace(/\bS[ua]t+\b/gi, "薩");   // Sat -> 薩 (短促音)
        processedText = processedText.replace(/\bMaeng+\b/gi, "曼");   // Maeng -> 曼 (較接近泰文發音)
        
        // 4. 原本的泰文原生字與固定單字字典替換
        for (const [thaiWord, phonetic] of Object.entries(thaiDictionary)) {
            const regex = new RegExp(thaiWord, "g");
            processedText = processedText.replace(regex, ` ${phonetic} `); 
        }

        // 5. 🚀 ★ 波浪號「自動斷句拉長」系統 ★
        // 將半形(~)與全形(～)波浪號，全部自動轉換為系統能懂的停頓符號「...」
        processedText = processedText.replace(/[~～]/g, "... ");
        
        return processedText;
    }

    function getDynamicRate(text, baseRate) {
        const englishMatch = text.match(/[a-zA-Z]/g);
        const englishCount = englishMatch ? englishMatch.length : 0;
        const totalLength = text.length || 1;
        const englishRatio = englishCount / totalLength;

        if (englishRatio > 0.2) {
            const slowdownFactor = 1 - (Math.min(englishRatio, 1) * 0.2); 
            return Math.max(0.5, baseRate * slowdownFactor);
        }
        return baseRate;
    }

    function highlightSentence(index) {
        const spans = document.querySelectorAll('.sentence');
        spans.forEach(span => span.classList.remove('active-sentence'));
        if (spans[index]) {
            spans[index].classList.add('active-sentence');
            spans[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function speakSentence(index) {
        if (index < 0 || index >= sentencesRaw.length) {
            statusText.textContent = "朗讀完畢。";
            btnPause.disabled = true;
            btnRewind.disabled = true;
            return;
        }
        
        synth.cancel();
        highlightSentence(index);
        
        const rawText = sentencesRaw[index];
        const textToSpeak = preprocessText(rawText);
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        
        const selectedVoiceName = voiceSelect.value;
        const voice = voices.find(v => v.name === selectedVoiceName);
        if (voice) utterance.voice = voice;
        
        const baseRate = parseFloat(speedRange.value);
        utterance.rate = getDynamicRate(textToSpeak, baseRate);
        
        utterance.onstart = () => {
            statusText.textContent = `正在朗讀：第 ${index + 1} / ${sentencesRaw.length} 句 (動態語速: ${utterance.rate.toFixed(2)}x)`;
            btnPause.disabled = false;
            btnResume.disabled = true;
            btnRewind.disabled = false;
        };

        utterance.onend = () => {
            if (!isSpeedAdjusting) {
                currentSentenceIndex++;
                speakSentence(currentSentenceIndex);
            }
        };

        utterance.onerror = (e) => {
            if (e.error !== 'canceled') {
                console.error('語音錯誤', e);
            }
        };

        synth.speak(utterance);
    }

    btnPlay.addEventListener('click', () => {
        const text = textInput.value.trim();
        if (!text) return alert("請先輸入文字。");

        textInput.style.display = 'none';
        readDisplay.style.display = 'block';
        
        sentencesRaw = text.match(/[^。！？.!?\n]+[。！？.!?\n]*/g) || [text];
        
        readDisplay.innerHTML = '';
        sentencesRaw.forEach((sentence, i) => {
            const span = document.createElement('span');
            span.className = 'sentence';
            span.textContent = sentence;
            span.onclick = () => {
                currentSentenceIndex = i;
                speakSentence(currentSentenceIndex);
            };
            readDisplay.appendChild(span);
        });

        currentSentenceIndex = 0;
        speakSentence(currentSentenceIndex);
        btnEdit.style.display = 'inline-block';
    });

    btnPause.addEventListener('click', () => {
        if (synth.speaking) {
            synth.pause();
            btnPause.disabled = true;
            btnResume.disabled = false;
            statusText.textContent = "已暫停。";
        }
    });

    btnResume.addEventListener('click', () => {
        if (synth.paused) {
            synth.resume();
            btnPause.disabled = false;
            btnResume.disabled = true;
            statusText.textContent = `繼續朗讀：第 ${currentSentenceIndex + 1} / ${sentencesRaw.length} 句`;
        }
    });

    btnRewind.addEventListener('click', () => {
        if (sentencesRaw.length === 0) return;
        currentSentenceIndex = Math.max(0, currentSentenceIndex - 1);
        speakSentence(currentSentenceIndex);
    });

    btnEdit.addEventListener('click', () => {
        synth.cancel();
        textInput.style.display = 'block';
        readDisplay.style.display = 'none';
        btnPause.disabled = true;
        btnResume.disabled = true;
        btnRewind.disabled = true;
        statusText.textContent = "已返回編輯模式。";
    });

    window.addEventListener('beforeunload', () => {
        synth.cancel();
    });
</script>

</body>
</html>
