<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text-to-Speech Pro Assistant</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --highlight-bg: #FFFFCC; 
            --hover-bg: #f0f0f0;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --btn-disabled: #cccccc;
            --status-color: #666666;
            --accent-color: #007aff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --container-bg: #2c2c2e;
                --text-color: #e5e5ea;
                --border-color: #48484a;
                --highlight-bg: rgba(255, 255, 102, 0.25); 
                --hover-bg: #3a3a3c;
                --btn-bg: #e5e5ea;
                --btn-text: #000000;
                --btn-hover: #ffffff;
                --btn-disabled: #48484a;
                --status-color: #aeaeb2;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 內容顯示區 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .text-area-container {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--container-bg);
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
        }

        textarea {
            width: 100%;
            height: 100%;
            padding: 15px;
            border: none;
            font-size: 17px;
            line-height: 1.8;
            outline: none;
            background: transparent;
            color: var(--text-color);
            resize: none;
        }

        #readDisplay {
            display: none;
            padding: 15px;
            font-size: 17px;
            line-height: 1.8;
            white-space: pre-wrap;
            width: 100%;
        }

        .sentence { transition: background-color 0.2s; border-radius: 4px; cursor: pointer; }
        .active-sentence { background-color: var(--highlight-bg); font-weight: 500; }

        /* 固定在底部的控制列 */
        .control-bar {
            background: var(--container-bg);
            border-top: 1px solid var(--border-color);
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .controls-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .controls-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        select, button {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            background: var(--container-bg);
            color: var(--text-color);
            padding: 10px;
        }

        select { width: 100%; height: 44px; }

        button {
            background: var(--btn-bg);
            color: var(--btn-text);
            font-weight: 600;
            height: 44px;
            cursor: pointer;
            border: none;
        }

        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #btnStop { background: #ff3b30; color: white; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
        }

        input[type="range"] { flex: 1; }
        .status { font-size: 12px; color: var(--status-color); text-align: center; margin-top: 8px; }

    </style>
</head>
<body>

<div class="content-area">
    <h2 style="margin: 0 0 15px 0; font-size: 20px;">文字朗讀助理 Pro</h2>
    <div class="text-area-container">
        <textarea id="textInput" placeholder="在此貼上妳的小說內容..."></textarea>
        <div id="readDisplay"></div>
    </div>
</div>

<div class="control-bar">
    <div class="controls-row">
        <select id="voiceSelect"><option value="">載入聲音中...</option></select>
    </div>
    
    <div class="controls-buttons">
        <button id="btnPlay">播放 / 導讀</button>
        <button id="btnPause" disabled>暫停</button>
        <button id="btnStop" disabled>停止</button>
        <button id="btnRewind" disabled>上一句</button>
        <button id="btnResume" disabled>繼續</button>
        <button id="btnEdit">返回編輯</button>
    </div>

    <div class="slider-container">
        <label style="font-size: 13px;">語速：</label>
        <input type="range" id="speedRange" min="0.5" max="3.0" step="0.1" value="1.3">
        <span id="speedValue" style="font-size: 13px; width: 35px;">1.3x</span>
    </div>
    <div class="status" id="statusText">系統待命中...</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let sentencesRaw = [];
    let currentSentenceIndex = 0;
    let isSpeedAdjusting = false;
    let wakeLock = null;

    const voiceSelect = document.getElementById('voiceSelect');
    const textInput = document.getElementById('textInput');
    const readDisplay = document.getElementById('readDisplay');
    const speedRange = document.getElementById('speedRange');
    const statusText = document.getElementById('statusText');

    const thaiDict = {
        "ครับ": "khrap", "ค่ะ": "kha", "คะ": "kha", "นะ": "na", "คุณ": "khun", "พี่": "Pi", 
        "เช夫": "chef", "หมอ": "mor", "รัก": "rak", "อร่อย": "aroi", "ขอโทษ": "kho thot"
    };

    // 嘗試取得螢幕喚醒鎖定
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
        } catch (err) { console.log('Wake Lock failed'); }
    }

    function loadVoices() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        
        // 嚴格精準過濾
        const allowed = [
            'zh-tw', 'zh-cn', 'zh-hk', 'yue', // 中文/粵語
            'th-th', 'ja-jp', 'ko-kr',       // 泰/日/韓
            'en-us', 'en-gb'                 // 英語(僅限美英)
        ];

        let filtered = voices.filter(v => allowed.some(lang => v.lang.toLowerCase().replace('_', '-').startsWith(lang)));

        // 排序：中文優先
        filtered.sort((a, b) => {
            const aZh = a.lang.includes('zh') || a.lang.includes('yue');
            const bZh = b.lang.includes('zh') || b.lang.includes('yue');
            return bZh - aZh;
        });

        filtered.forEach(v => {
            const opt = document.createElement('option');
            opt.textContent = `${v.name} (${v.lang})`;
            opt.value = v.name;
            voiceSelect.appendChild(opt);
        });
        
        if (voiceSelect.options.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = "未偵測到相容語言包";
            voiceSelect.appendChild(opt);
        }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }
    setTimeout(loadVoices, 500);

    speedRange.oninput = () => document.getElementById('speedValue').textContent = speedRange.value + 'x';

    function preprocess(text) {
        let p = text;
        // 稱謂解壓縮
        p = p.replace(/\bP'/gi, "Phi ").replace(/\bN'/gi, "Nong ").replace(/\bK'/gi, "Khun ").replace(/\bAi'/gi, "Ai ").replace(/\b[EI]'/gi, "Ee ");
        // 情緒擬音
        p = p.replace(/\bAo[w]*\b/gi, "嗷").replace(/O~ho+/gi, "喔齁").replace(/\bOho+\b/gi, "喔齁");
        p = p.replace(/\bO[iy]+\b/gi, "噢伊").replace(/\bNa+\b/gi, "吶").replace(/\b[Jj]a+\b/gi, "佳").replace(/\b[Kk]h?a+\b/gi, "卡");
        // 符號處理
        p = p.replace(/([a-zA-Z])[~～]+([a-zA-Z])/g, "$1 $2").replace(/[~～]+/g, "... ");
        for (const [k, v] of Object.entries(thaiDict)) p = p.replace(new RegExp(k, "g"), ` ${v} `);
        return p;
    }

    function getDynamicRate(text, baseRate) {
        const engMatch = text.match(/[a-zA-Z]/g);
        const ratio = (engMatch ? engMatch.length : 0) / (text.length || 1);
        return ratio > 0.2 ? Math.max(0.5, baseRate * (1 - (ratio * 0.2))) : baseRate;
    }

    function speakSentence(index) {
        if (index < 0 || index >= sentencesRaw.length) {
            stopPlayback();
            statusText.textContent = "朗讀完畢。";
            return;
        }
        currentSentenceIndex = index;
        synth.cancel();

        const spans = document.querySelectorAll('.sentence');
        spans.forEach(s => s.classList.remove('active-sentence'));
        if (spans[index]) {
            spans[index].classList.add('active-sentence');
            spans[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        const utt = new SpeechSynthesisUtterance(preprocess(sentencesRaw[index]));
        const voice = voices.find(v => v.name === voiceSelect.value);
        if (voice) utt.voice = voice;
        utt.rate = getDynamicRate(sentencesRaw[index], parseFloat(speedRange.value));

        utt.onstart = () => { statusText.textContent = `朗讀中：${index + 1} / ${sentencesRaw.length}`; };
        utt.onend = () => { if (!isSpeedAdjusting && synth.speaking) { speakSentence(currentSentenceIndex + 1); } };
        
        synth.speak(utt);
    }

    function stopPlayback() {
        synth.cancel();
        currentSentenceIndex = 0;
        document.getElementById('btnPause').disabled = true;
        document.getElementById('btnStop').disabled = true;
        document.getElementById('btnResume').disabled = true;
        document.getElementById('btnRewind').disabled = true;
        statusText.textContent = "已停止。";
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }

    document.getElementById('btnPlay').onclick = async () => {
        const t = textInput.value.trim(); if (!t) return;
        await requestWakeLock();
        textInput.style.display = 'none'; readDisplay.style.display = 'block';
        sentencesRaw = t.match(/[^。！？.!?\n]+[。！？.!?\n]*/g) || [t];
        readDisplay.innerHTML = '';
        sentencesRaw.forEach((s, i) => {
            const span = document.createElement('span');
            span.className = 'sentence'; span.textContent = s;
            span.onclick = () => speakSentence(i);
            readDisplay.appendChild(span);
        });
        document.getElementById('btnPause').disabled = false;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('btnRewind').disabled = false;
        speakSentence(0);
    };

    document.getElementById('btnPause').onclick = () => { synth.pause(); document.getElementById('btnResume').disabled = false; };
    document.getElementById('btnResume').onclick = () => { synth.resume(); document.getElementById('btnResume').disabled = true; };
    document.getElementById('btnStop').onclick = stopPlayback;
    document.getElementById('btnRewind').onclick = () => speakSentence(Math.max(0, currentSentenceIndex - 1));
    document.getElementById('btnEdit').onclick = () => { stopPlayback(); textInput.style.display = 'block'; readDisplay.style.display = 'none'; };

</script>
</body>
</html>
