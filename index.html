<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text-to-Speech Pro Assistant</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --highlight-bg: #FFFFCC; 
            --hover-bg: #f0f0f0;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --btn-disabled: #cccccc;
            --status-color: #666666;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --container-bg: #2c2c2e;
                --text-color: #e5e5ea;
                --border-color: #48484a;
                --highlight-bg: rgba(255, 255, 102, 0.25); 
                --hover-bg: #3a3a3c;
                --btn-bg: #e5e5ea;
                --btn-text: #000000;
                --btn-hover: #ffffff;
                --btn-disabled: #48484a;
                --status-color: #aeaeb2;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            margin: 0;
            padding: max(15px, env(safe-area-inset-top)) max(15px, env(safe-area-inset-right)) max(15px, env(safe-area-inset-bottom)) max(15px, env(safe-area-inset-left));
            box-sizing: border-box;
        }

        .container {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 600px) {
            .container { padding: 30px; height: auto; max-height: 90vh; }
        }

        .text-area-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
        }

        textarea {
            width: 100%; height: 100%; min-height: 200px;
            padding: 15px; border: none; font-size: 16px;
            resize: none; box-sizing: border-box; line-height: 1.8;
            outline: none; background-color: transparent; color: var(--text-color);
        }

        #readDisplay {
            display: none; padding: 15px; font-size: 16px;
            line-height: 1.8; white-space: pre-wrap;
        }

        .sentence { transition: background-color 0.2s; border-radius: 4px; cursor: pointer; }
        .sentence:hover { background-color: var(--hover-bg); }
        .active-sentence { background-color: var(--highlight-bg); }

        .controls-top { display: flex; width: 100%; margin-bottom: 15px; }

        select {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 15px;
            background-color: var(--container-bg); color: var(--text-color);
        }

        .controls-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--btn-bg); color: var(--btn-text);
            border: none; padding: 14px 8px; border-radius: 10px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            display: flex; justify-content: center; align-items: center;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background-color: var(--btn-disabled); color: #888; cursor: not-allowed; }

        #btnPlay { grid-column: 1 / 2; }
        #btnPause { grid-column: 2 / 3; }
        #btnResume { grid-column: 3 / 4; }
        #btnRewind { grid-column: 1 / 3; } 
        #btnEdit { grid-column: 3 / 4; }

        .slider-container {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; font-size: 14px; margin-bottom: 15px;
            background: var(--hover-bg); padding: 12px 15px; border-radius: 10px;
        }

        input[type="range"] { flex: 1; margin: 0 10px; }
        #speedValue { width: 35px; text-align: right; font-weight: 500; }

        .status { font-size: 13px; color: var(--status-color); text-align: center; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0; margin-bottom: 15px; font-size: 22px;">文字朗讀助理 Pro</h2>
    <div class="controls-top">
        <select id="voiceSelect"><option value="">載入中...</option></select>
    </div>
    <div class="text-area-container" id="textContainer">
        <textarea id="textInput" placeholder="請在此貼上文字..."></textarea>
        <div id="readDisplay"></div>
    </div>
    <div class="controls-buttons">
        <button id="btnPlay">播放/導讀</button>
        <button id="btnPause" disabled>暫停</button>
        <button id="btnResume" disabled>繼續</button>
        <button id="btnRewind" disabled>回溯</button>
        <button id="btnEdit">返回編輯</button>
    </div>
    <div class="slider-container">
        <label>基準語速：</label>
        <input type="range" id="speedRange" min="0.5" max="3.0" step="0.1" value="1.3">
        <span id="speedValue">1.3x</span>
    </div>
    <div class="status" id="statusText">系統待命中...</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let sentencesRaw = [];
    let currentSentenceIndex = 0;
    let isSpeedAdjusting = false; 

    const thaiDict = {
        "ครับ": "khrap", "ค่ะ": "kha", "คะ": "kha", "นะ": "na", "คุณ": "khun", "พี่": "Pi", 
        "เช夫": "chef", "หมอ": "mor", "รัก": "rak", "อร่อย": "aroi", "ขอโทษ": "kho thot"
    };

    const voiceSelect = document.getElementById('voiceSelect');
    const textInput = document.getElementById('textInput');
    const readDisplay = document.getElementById('readDisplay');
    const speedRange = document.getElementById('speedRange');
    const statusText = document.getElementById('statusText');

    function loadVoices() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        const allowedLangs = ['zh-tw', 'zh-cn', 'zh-hk', 'yue', 'en-us', 'en-gb', 'th-th', 'ja-jp', 'ko-kr']; 
        const filtered = voices.filter(v => allowedLangs.some(l => v.lang.toLowerCase().startsWith(l)));
        let zh = filtered.filter(v => v.lang.toLowerCase().startsWith('zh') || v.lang.toLowerCase().startsWith('yue'));
        let others = filtered.filter(v => !zh.includes(v));
        let top5 = [];
        const extract = (kws) => {
            const idx = zh.findIndex(v => kws.some(kw => v.name.toLowerCase().includes(kw)));
            return idx !== -1 ? zh.splice(idx, 1)[0] : null;
        };
        const v1 = extract(['siri', 'xiaoxiao', 'google', 'mei-jia']);
        const v2 = extract(['yating', 'ting-ting', 'female', '女']);
        const v3 = extract(['yunxi', 'yunjian', 'male', '男']);
        const v4 = extract(['tw', 'taiwan']);
        const v5 = extract(['hk', 'hongkong', 'yue']);
        [v1, v2, v3, v4, v5].forEach((v, i) => { if (v) top5.push({label: `語音樣式 ${i+1}`, voice: v}); });
        const zhGroup = document.createElement('optgroup');
        zhGroup.label = "精選中文擬真語音";
        top5.forEach(item => {
            const opt = document.createElement('option');
            opt.textContent = `${item.label} - ${item.voice.name}`;
            opt.value = item.voice.name;
            zhGroup.appendChild(opt);
        });
        voiceSelect.appendChild(zhGroup);
        const otherGroup = document.createElement('optgroup');
        otherGroup.label = "支援外語 (純淨版)";
        others.forEach(v => {
            const opt = document.createElement('option');
            opt.textContent = `${v.name} (${v.lang.split('-')[0].toUpperCase()})`;
            opt.value = v.name;
            otherGroup.appendChild(opt);
        });
        voiceSelect.appendChild(otherGroup);
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    setTimeout(loadVoices, 500);

    speedRange.oninput = () => document.getElementById('speedValue').textContent = speedRange.value + 'x';
    speedRange.onchange = () => {
        if (synth.speaking && !synth.paused) {
            isSpeedAdjusting = true; synth.cancel();
            setTimeout(() => { speakSentence(currentSentenceIndex); isSpeedAdjusting = false; }, 50);
        }
    };

    function preprocess(text) {
        let p = text;
        // 稱謂解壓縮
        p = p.replace(/\bP'/gi, "Phi ").replace(/\bN'/gi, "Nong ").replace(/\bK'/gi, "Khun ").replace(/\bAi'/gi, "Ai ").replace(/\b[EI]'/gi, "Ee ");
        // 情緒長音歸一化
        p = p.replace(/\bO[iy]+\b/gi, "噢伊").replace(/\bAo[w]+\b/gi, "嗷").replace(/\bNa+\b/gi, "吶").replace(/\b[Jj]a+\b/gi, "佳");
        p = p.replace(/O~ho+/gi, "喔齁").replace(/\bOho+\b/gi, "喔齁");
        // 泰百常用語羅馬拼音校正
        p = p.replace(/\bShia+\b/gi, "hia").replace(/\bMaeng+\b/gi, "maeng").replace(/\bW[oe]i+\b/gi, "woei").replace(/\bNgong\b/gi, "ngong");
        // 波浪號處理
        p = p.replace(/([a-zA-Z])[~～]+([a-zA-Z])/g, "$1 $2").replace(/[~～]+/g, "... ");
        for (const [k, v] of Object.entries(thaiDict)) p = p.replace(new RegExp(k, "g"), ` ${v} `);
        return p;
    }

    function getDynamicRate(text, baseRate) {
        const engMatch = text.match(/[a-zA-Z]/g);
        const engCount = engMatch ? engMatch.length : 0;
        const total = text.length || 1;
        const ratio = engCount / total;
        // 若拼音佔比超過 20%，自動降速 15%-20% 以達到勻速體感
        if (ratio > 0.2) {
            const factor = 1 - (Math.min(ratio, 1) * 0.2);
            return Math.max(0.5, baseRate * factor);
        }
        return baseRate;
    }

    function speakSentence(index) {
        if (index < 0 || index >= sentencesRaw.length) return statusText.textContent = "朗讀完畢。";
        synth.cancel();
        const spans = document.querySelectorAll('.sentence');
        spans.forEach(s => s.classList.remove('active-sentence'));
        if (spans[index]) { spans[index].classList.add('active-sentence'); spans[index].scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        
        const processed = preprocess(sentencesRaw[index]);
        const utt = new SpeechSynthesisUtterance(processed);
        const voice = voices.find(v => v.name === voiceSelect.value);
        if (voice) utt.voice = voice;
        
        const baseRate = parseFloat(speedRange.value);
        utt.rate = getDynamicRate(processed, baseRate);

        utt.onstart = () => { statusText.textContent = `朗讀中：${index + 1} / ${sentencesRaw.length}`; };
        utt.onend = () => { if (!isSpeedAdjusting) { currentSentenceIndex++; speakSentence(currentSentenceIndex); } };
        synth.speak(utt);
    }

    document.getElementById('btnPlay').onclick = () => {
        const t = textInput.value.trim(); if (!t) return;
        textInput.style.display = 'none'; readDisplay.style.display = 'block';
        sentencesRaw = t.match(/[^。！？.!?\n]+[。！？.!?\n]*/g) || [t];
        readDisplay.innerHTML = '';
        sentencesRaw.forEach((s, i) => {
            const span = document.createElement('span');
            span.className = 'sentence'; span.textContent = s;
            span.onclick = () => { currentSentenceIndex = i; speakSentence(i); };
            readDisplay.appendChild(span);
        });
        currentSentenceIndex = 0; speakSentence(0);
        document.getElementById('btnPause').disabled = false;
        document.getElementById('btnRewind').disabled = false;
    };

    document.getElementById('btnPause').onclick = () => { synth.pause(); document.getElementById('btnResume').disabled = false; };
    document.getElementById('btnResume').onclick = () => { synth.resume(); document.getElementById('btnResume').disabled = true; };
    document.getElementById('btnRewind').onclick = () => { currentSentenceIndex = Math.max(0, currentSentenceIndex - 1); speakSentence(currentSentenceIndex); };
    document.getElementById('btnEdit').onclick = () => { synth.cancel(); textInput.style.display = 'block'; readDisplay.style.display = 'none'; };
</script>
</body>
</html>
