<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文字朗讀助理 Pro</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --highlight-bg: #FFFFCC; 
            --hover-bg: #f0f0f0;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
            --btn-disabled: #cccccc;
            --status-color: #666666;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --container-bg: #2c2c2e;
                --text-color: #e5e5ea;
                --border-color: #48484a;
                --highlight-bg: rgba(255, 255, 102, 0.25); 
                --hover-bg: #3a3a3c;
                --btn-bg: #e5e5ea;
                --btn-text: #000000;
                --btn-hover: #ffffff;
                --btn-disabled: #48484a;
                --status-color: #aeaeb2;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 20px);
            max-height: 100%;
            box-sizing: border-box;
            margin: 10px;
        }

        .text-area-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
        }

        textarea {
            width: 100%; height: 100%; min-height: 100%;
            padding: 15px; border: none; font-size: 16px;
            resize: none; box-sizing: border-box; line-height: 1.8;
            outline: none; background-color: transparent; color: var(--text-color);
        }

        #readDisplay {
            display: none; padding: 15px; font-size: 16px;
            line-height: 1.8; white-space: pre-wrap;
        }

        .sentence { transition: background-color 0.2s; border-radius: 4px; cursor: pointer; }
        .sentence:hover { background-color: var(--hover-bg); }
        .active-sentence { background-color: var(--highlight-bg); }

        .controls-top { display: flex; width: 100%; margin-bottom: 15px; flex-shrink: 0; }

        select {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 15px;
            background-color: var(--container-bg); color: var(--text-color);
        }

        /* 影片中的 6 宮格按鈕排版 */
        .controls-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        button {
            background-color: var(--btn-bg); color: var(--btn-text);
            border: none; padding: 14px 8px; border-radius: 10px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            display: flex; justify-content: center; align-items: center;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background-color: var(--btn-disabled); color: #888; cursor: not-allowed; }

        #btnPlay { grid-column: 1 / 2; }
        #btnPause { grid-column: 2 / 3; }
        #btnStop { grid-column: 3 / 4; background-color: #d32f2f; color: white; }
        #btnRewind { grid-column: 1 / 2; } 
        #btnResume { grid-column: 2 / 3; }
        #btnEdit { grid-column: 3 / 4; background-color: #f0f0f0; color: #333; border: 1px solid #ccc; }

        @media (prefers-color-scheme: dark) {
            #btnEdit { background-color: #3a3a3c; color: #fff; border: 1px solid #555; }
        }

        .slider-container {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; font-size: 14px; margin-bottom: 10px;
            background: var(--hover-bg); padding: 12px 15px; border-radius: 10px;
            flex-shrink: 0;
        }

        input[type="range"] { flex: 1; margin: 0 10px; }
        #speedValue { width: 35px; text-align: right; font-weight: 500; }

        .status { font-size: 13px; color: var(--status-color); text-align: center; padding-bottom: 5px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0; margin-bottom: 10px; font-size: 22px; flex-shrink: 0;">文字朗讀助理 Pro</h2>
    <div class="controls-top">
        <select id="voiceSelect"><option value="">載入中...</option></select>
    </div>
    <div class="text-area-container" id="textContainer">
        <textarea id="textInput" placeholder="請在此貼上妳的小說內容..."></textarea>
        <div id="readDisplay"></div>
    </div>
    
    <div class="controls-buttons">
        <button id="btnPlay">播放/導讀</button>
        <button id="btnPause" disabled>暫停</button>
        <button id="btnStop" disabled>停止</button>
        <button id="btnRewind" disabled>上一句</button>
        <button id="btnResume" disabled>繼續</button>
        <button id="btnEdit">返回編輯</button>
    </div>

    <div class="slider-container">
        <label>語速：</label>
        <input type="range" id="speedRange" min="0.5" max="3.0" step="0.1" value="1.3">
        <span id="speedValue">1.3x</span>
    </div>
    <div class="status" id="statusText">系統待命中...</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let sentencesRaw = [];
    let currentSentenceIndex = 0;
    
    // ★ iOS 專用引擎喚醒鎖
    let audioUnlocked = false;
    function unlockSpeechEngine() {
        if (!audioUnlocked) {
            const silentUtterance = new SpeechSynthesisUtterance('');
            silentUtterance.volume = 0;
            synth.speak(silentUtterance);
            audioUnlocked = true;
        }
    }

    const thaiDict = {
        "ครับ": "khrap", "ค่ะ": "kha", "คะ": "kha", "นะ": "na", "คุณ": "khun", "พี่": "Pi", 
        "เช夫": "chef", "หมอ": "mor", "รัก": "rak", "อร่อย": "aroi", "ขอโทษ": "kho thot"
    };

    const voiceSelect = document.getElementById('voiceSelect');
    const textInput = document.getElementById('textInput');
    const readDisplay = document.getElementById('readDisplay');
    const speedRange = document.getElementById('speedRange');
    const statusText = document.getElementById('statusText');

    // 按鈕群組
    const btnPlay = document.getElementById('btnPlay');
    const btnPause = document.getElementById('btnPause');
    const btnStop = document.getElementById('btnStop');
    const btnRewind = document.getElementById('btnRewind');
    const btnResume = document.getElementById('btnResume');
    const btnEdit = document.getElementById('btnEdit');

    function loadVoices() {
        voices = synth.getVoices();
        if (voices.length === 0) return;
        voiceSelect.innerHTML = '';
        
        const exactMatches = ['zh', 'yue', 'th', 'ja', 'ko'];
        const exactEnglish = ['en-us', 'en-gb'];

        const filtered = voices.filter(v => {
            const l = v.lang.toLowerCase().replace('_', '-');
            return exactMatches.some(prefix => l.startsWith(prefix)) || exactEnglish.some(prefix => l.startsWith(prefix));
        });

        let zh = filtered.filter(v => v.lang.toLowerCase().includes('zh') || v.lang.toLowerCase().includes('yue'));
        let others = filtered.filter(v => !zh.includes(v));

        let top5 = [];
        const extract = (kws) => {
            const idx = zh.findIndex(v => kws.some(kw => v.name.toLowerCase().includes(kw)));
            return idx !== -1 ? zh.splice(idx, 1)[0] : null;
        };

        const v1 = extract(['siri', 'xiaoxiao', 'google', 'mei-jia']);
        const v2 = extract(['yating', 'ting-ting', 'female', '女']);
        const v3 = extract(['yunxi', 'yunjian', 'male', '男']);
        const v4 = extract(['tw', 'taiwan']);
        const v5 = extract(['hk', 'hongkong', 'yue']);

        [v1, v2, v3, v4, v5].forEach((v, i) => { if (v) top5.push({label: `語音樣式 ${i+1}`, voice: v}); });
        while(top5.length < 5 && zh.length > 0) { top5.push({label: `語音樣式 ${top5.length + 1}`, voice: zh.shift()}); }

        const zhGroup = document.createElement('optgroup');
        zhGroup.label = "精選中文擬真語音";
        top5.forEach(item => {
            const opt = document.createElement('option');
            opt.textContent = `${item.label} - ${item.voice.name}`;
            opt.value = item.voice.name;
            zhGroup.appendChild(opt);
        });
        voiceSelect.appendChild(zhGroup);

        const otherGroup = document.createElement('optgroup');
        otherGroup.label = "支援外語 (純淨版)";
        others.forEach(v => {
            const opt = document.createElement('option');
            opt.textContent = `${v.name} (${v.lang})`;
            opt.value = v.name;
            otherGroup.appendChild(opt);
        });
        voiceSelect.appendChild(otherGroup);
    }

    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }
    setTimeout(loadVoices, 800);

    speedRange.oninput = () => speedValue.textContent = speedRange.value + 'x';
    speedRange.onchange = () => {
        if (synth.speaking && !synth.paused) {
            safeSpeak(currentSentenceIndex);
        }
    };

    function preprocess(text) {
        let p = text;
        p = p.replace(/\bP'/gi, "Phi ").replace(/\bN'/gi, "Nong ").replace(/\bK'/gi, "Khun ").replace(/\bAi'/gi, "Ai ").replace(/\b[EI]'/gi, "Ee ");
        p = p.replace(/\bAo[w]*\b/gi, "嗷").replace(/O~ho+/gi, "喔齁").replace(/\bOho+\b/gi, "喔齁");
        p = p.replace(/\bO[iy]+\b/gi, "噢伊").replace(/\bNa+\b/gi, "吶").replace(/\b[Jj]a+\b/gi, "佳");
        p = p.replace(/\b[Kk]h?a+\b/gi, "卡").replace(/\bW[oe]i+\b/gi, "喂").replace(/\b[Ee]uy+\b/gi, "欸");
        p = p.replace(/\bShia+\b/gi, "hia").replace(/\bMaeng+\b/gi, "maeng").replace(/\bW[oe]i+\b/gi, "woei").replace(/\bNgong\b/gi, "ngong");
        p = p.replace(/([a-zA-Z])[~～]+([a-zA-Z])/g, "$1 $2").replace(/[~～]+/g, "... ");
        for (const [k, v] of Object.entries(thaiDict)) p = p.replace(new RegExp(k, "g"), ` ${v} `);
        return p;
    }

    function getDynamicRate(text, baseRate) {
        const engMatch = text.match(/[a-zA-Z]/g);
        const engCount = engMatch ? engMatch.length : 0;
        const total = text.length || 1;
        const ratio = engCount / total;
        if (ratio > 0.2) return Math.max(0.5, baseRate * (1 - (Math.min(ratio, 1) * 0.2)));
        return baseRate;
    }

    // ★ 安全播放函數 (解決卡死 Bug)
    function safeSpeak(index) {
        synth.cancel(); // 清空佇列
        if (index < 0 || index >= sentencesRaw.length) {
            statusText.textContent = "朗讀完畢。";
            btnPause.disabled = true; btnStop.disabled = true; btnRewind.disabled = true; btnResume.disabled = true;
            return;
        }

        const spans = document.querySelectorAll('.sentence');
        spans.forEach(s => s.classList.remove('active-sentence'));
        if (spans[index]) { spans[index].classList.add('active-sentence'); spans[index].scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        
        // 延遲 100ms 讓 iOS 緩衝，避免 cancel 後立刻 speak 導致引擎當機
        setTimeout(() => {
            const processed = preprocess(sentencesRaw[index]);
            const utt = new SpeechSynthesisUtterance(processed);
            const voice = voices.find(v => v.name === voiceSelect.value);
            if (voice) utt.voice = voice;
            
            utt.rate = getDynamicRate(processed, parseFloat(speedRange.value));

            utt.onstart = () => { statusText.textContent = `朗讀中：${index + 1} / ${sentencesRaw.length}`; };
            utt.onend = (e) => { 
                // 防止被 cancel 觸發的 onend 影響
                if (e.name !== 'cancel' && index === currentSentenceIndex) {
                    currentSentenceIndex++; 
                    safeSpeak(currentSentenceIndex); 
                }
            };
            utt.onerror = (e) => { console.log('Speech error:', e); };
            
            synth.speak(utt);
        }, 100);
    }

    btnPlay.onclick = () => {
        unlockSpeechEngine(); // 強制喚醒 iOS 引擎
        const t = textInput.value.trim(); if (!t) return;
        textInput.style.display = 'none'; readDisplay.style.display = 'block';
        
        sentencesRaw = t.match(/[^。！？.!?\n]+[。！？.!?\n]*/g) || [t];
        readDisplay.innerHTML = '';
        sentencesRaw.forEach((s, i) => {
            const span = document.createElement('span');
            span.className = 'sentence'; span.textContent = s;
            span.onclick = () => { unlockSpeechEngine(); currentSentenceIndex = i; safeSpeak(i); };
            readDisplay.appendChild(span);
        });
        
        currentSentenceIndex = 0; 
        safeSpeak(0);
        
        btnPause.disabled = false; btnStop.disabled = false; btnRewind.disabled = false;
    };

    btnPause.onclick = () => { synth.pause(); btnResume.disabled = false; btnPause.disabled = true; statusText.textContent = "已暫停。"; };
    btnResume.onclick = () => { synth.resume(); btnResume.disabled = true; btnPause.disabled = false; };
    btnRewind.onclick = () => { currentSentenceIndex = Math.max(0, currentSentenceIndex - 1); safeSpeak(currentSentenceIndex); };
    
    btnStop.onclick = () => { 
        synth.cancel(); 
        statusText.textContent = "已停止。"; 
        btnPause.disabled = true; btnResume.disabled = true; btnRewind.disabled = true;
    };

    btnEdit.onclick = () => { 
        synth.cancel(); 
        textInput.style.display = 'block'; 
        readDisplay.style.display = 'none'; 
        btnPause.disabled = true; btnStop.disabled = true; btnResume.disabled = true; btnRewind.disabled = true;
        statusText.textContent = "已返回編輯。";
    };
</script>
</body>
</html>
